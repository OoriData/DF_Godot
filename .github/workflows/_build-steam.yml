name: Build Desktop (Steam) (PC/Mac)

# Produces Steamworks-integrated Windows + macOS builds as artifacts
# (steam-build-windows / steam-build-macos). These are NOT auto-uploaded to Steam
# — Steam distribution is a manual SteamPipe step (see docs/04_Technical/Deployment.md).
#
# GodotSteam is kept DISABLED at rest in the repo (so the iOS build in the full
# pipeline works — GodotSteam has no iOS library). Each job below enables it just
# for the Steam build. macOS is re-signed ad-hoc via tools/steam_stage_macos.sh so
# hardened-runtime library validation doesn't block the Steam dylib at launch.

on:
  workflow_call:
    inputs:
      godot_version:
        required: true
        type: string
        default: '4.6.0'
      version_tag:
        required: true
        type: string

jobs:
  build_windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godot_version }}
          use-dotnet: false
          include-templates: true

      - name: Silence Android Plugin Warnings
        run: |
          mkdir -p addons/GodotGoogleSignIn
          touch addons/GodotGoogleSignIn/.gdignore

      - name: Enable GodotSteam
        run: |
          if [ -f addons/godotsteam/godotsteam.gdextension.disabled ]; then
            mv addons/godotsteam/godotsteam.gdextension.disabled addons/godotsteam/godotsteam.gdextension
            echo "Enabled GodotSteam for the Steam build."
          else
            echo "GodotSteam already enabled at rest."
          fi

      - name: Import Assets
        run: godot --headless --import

      - name: Ensure GodotSteam is registered
        run: |
          # .godot/ is gitignored and regenerated by --import; make sure the
          # extension is listed so its libraries get bundled into the export.
          LIST=.godot/extension_list.cfg
          mkdir -p .godot
          grep -q 'godotsteam/godotsteam.gdextension' "$LIST" 2>/dev/null \
            || echo 'res://addons/godotsteam/godotsteam.gdextension' >> "$LIST"

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --log-file /tmp/godot_windows.log --export-release "Windows Desktop (x86)" build/windows/Desolate_Frontiers.exe

      - name: Verify Steamworks bundled
        run: |
          if [ ! -f build/windows/steam_api64.dll ]; then
            echo "::error::steam_api64.dll missing next to the .exe — Steamworks was NOT bundled."
            ls -la build/windows
            exit 1
          fi
          echo "Steamworks present:"; ls -la build/windows

      - name: Zip Windows
        run: |
          cd build/windows
          zip -r ../Desolate_Frontiers_Windows.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-build-windows
          path: build/Desolate_Frontiers_Windows.zip

      - name: Upload Export Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: steam-windows-logs
          path: /tmp/godot_windows.log

  build_macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godot_version }}
          use-dotnet: false
          include-templates: true

      - name: Silence Android Plugin Warnings
        run: |
          mkdir -p addons/GodotGoogleSignIn
          touch addons/GodotGoogleSignIn/.gdignore

      - name: Enable GodotSteam
        run: |
          if [ -f addons/godotsteam/godotsteam.gdextension.disabled ]; then
            mv addons/godotsteam/godotsteam.gdextension.disabled addons/godotsteam/godotsteam.gdextension
            echo "Enabled GodotSteam for the Steam build."
          else
            echo "GodotSteam already enabled at rest."
          fi

      - name: Import Assets
        run: godot --headless --import || true

      - name: Ensure GodotSteam is registered
        run: |
          LIST=.godot/extension_list.cfg
          mkdir -p .godot
          grep -q 'godotsteam/godotsteam.gdextension' "$LIST" 2>/dev/null \
            || echo 'res://addons/godotsteam/godotsteam.gdextension' >> "$LIST"

      - name: Inject CI/CD Overrides
        shell: python
        run: |
          # Force codesign to Disabled so Godot does not try the (revoked) Oori cert.
          # We re-sign ad-hoc WITH the required entitlements in the next step.
          import re, sys
          with open("export_presets.cfg") as f:
              content = f.read()
          m = re.search(r'^\[preset\.(\d+)\]\s+name="macOS"\s*$', content, re.MULTILINE)
          if not m:
              print("Error: Could not find preset named 'macOS'"); sys.exit(1)
          idx = m.group(1)
          sec = re.compile(r"(\[preset\.%s\.options\].*?)(?=\n\[preset\.|\Z)" % idx, re.DOTALL)
          def setk(mm):
              s = mm.group(1)
              key, val = "codesign/codesign", "0"
              if re.search(r'^%s=' % re.escape(key), s, re.M):
                  s = re.sub(r'^%s=.*$' % re.escape(key), f"{key}={val}", s, flags=re.M)
              else:
                  s += f"\n{key}={val}"
              return s
          content = sec.sub(setk, content)
          with open("export_presets.cfg", "w") as f:
              f.write(content)

      - name: Export macOS
        run: |
          mkdir -p build/mac
          godot --headless --log-file /tmp/godot_steam_macos.log --export-release "macOS" build/mac/Desolate_Frontiers.app

      - name: Re-sign for Steam (drop hardened-runtime library validation)
        run: |
          chmod +x tools/steam_stage_macos.sh
          tools/steam_stage_macos.sh build/mac/Desolate_Frontiers.app build/mac_signed

      - name: Zip macOS
        run: |
          cd build/mac_signed
          zip -ry ../Desolate_Frontiers_macOS.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-build-macos
          path: build/Desolate_Frontiers_macOS.zip

      - name: Upload Export Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: steam-macos-logs
          path: /tmp/godot_steam_macos.log
