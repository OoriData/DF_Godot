name: Build Desktop (Steam) (PC/Mac)

on:
  workflow_call:
    inputs:
      godot_version:
        required: true
        type: string
        default: '4.6.0'
      version_tag:
        required: true
        type: string

jobs:
  build_windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godot_version }}
          use-dotnet: false
          include-templates: true

      - name: Silence Android Plugin Warnings
        run: |
          mkdir -p addons/GodotGoogleSignIn
          touch addons/GodotGoogleSignIn/.gdignore

      - name: Import Assets
        run: godot --headless --import

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --log-file /tmp/godot_windows.log --export-release "Windows Desktop (x86)" build/windows/Desolate_Frontiers.exe
          cd build/windows
          zip -r ../Desolate_Frontiers_Windows.zip .
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-windows
          path: build/Desolate_Frontiers_Windows.zip

  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godot_version }}
          use-dotnet: false
          include-templates: true

      - name: Silence Android Plugin Warnings
        run: |
          mkdir -p addons/GodotGoogleSignIn
          touch addons/GodotGoogleSignIn/.gdignore

      - name: Import Assets
        run: godot --headless --import || true

      - name: Export macOS
        run: |
          mkdir -p build
          # Godot macOS export creates a .zip by default when targeting a .zip extension
          godot --headless --log-file /tmp/godot_steam_macos.log --export-release "macOS" build/Desolate_Frontiers_macOS.zip
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-macos
          path: build/Desolate_Frontiers_macOS.zip


