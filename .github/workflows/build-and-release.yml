name: Build and Release

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot Engine Version'
        required: true
        default: '4.6.0'
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: web,android,ios,macos,steam)'
        required: true
        default: 'web,android,ios,macos,steam'
        type: string
      dispatch_publish:
        description: 'Publish and release the builds to distribution storefronts, host the new web build on GitHub Pages, and create a new tagged release on GitHub (only for workflow_dispatch)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - release  # Change this if you want it to trigger on other branches
    tags:
      - 'v*'

jobs:
  # Determine which platforms to build based on inputs or trigger
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_web: ${{ steps.check.outputs.build_web }}
      build_android: ${{ steps.check.outputs.build_android }}
      build_ios: ${{ steps.check.outputs.build_ios }}
      build_macos: ${{ steps.check.outputs.build_macos }}
      build_steam: ${{ steps.check.outputs.build_steam }}
      is_full_build: ${{ steps.check.outputs.is_full_build }}
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.notes }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: |
          VERSION=$(grep 'config/version' project.godot | awk -F '"' '{print $2}')
          echo "Extracted Version: $VERSION"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not a valid x.y.z semver (no suffixes allowed)."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - id: changelog
        shell: python
        run: |
          import re
          import os
          version = "${{ steps.version.outputs.version }}"
          with open("CHANGELOG.md", "r") as f:
              lines = f.readlines()
          
          content = []
          found = False
          version_pattern = re.compile(rf'^##\s*\[{re.escape(version)}\]')
          
          for line in lines:
              if version_pattern.search(line):
                  found = True
                  continue
              if found:
                  if re.match(r'^##\s*\[', line):
                      break
                  content.append(line)
          
          notes = "".join(content).strip()
          if not notes:
              notes = "No release notes found for this version."
          
          # GitHub Actions multiline output handling
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('notes<<EOF\n')
              f.write(notes + '\n')
              f.write('EOF\n')

      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PLATFORMS="${{ inputs.platforms }}"
          else
            # Automated runs (push/tag) default to all platforms
            PLATFORMS="web,android,ios,macos,steam"
          fi
          
          echo "Event: ${{ github.event_name }}"
          echo "Final Platforms: $PLATFORMS"
          
          if [[ -z "$PLATFORMS" ]]; then
            echo "::error::No platforms specified for build."
            exit 1
          fi
          
          # Check if it's a "full" build (contains all 5 standard platforms)
          IS_FULL="false"
          if [[ "$PLATFORMS" == *"web"* && "$PLATFORMS" == *"android"* && "$PLATFORMS" == *"ios"* && "$PLATFORMS" == *"macos"* && "$PLATFORMS" == *"steam"* ]]; then
            IS_FULL="true"
          fi
          echo "is_full_build=$IS_FULL" >> $GITHUB_OUTPUT
          
          if [[ "$PLATFORMS" == *"web"* ]]; then echo "build_web=true" >> $GITHUB_OUTPUT; else echo "build_web=false" >> $GITHUB_OUTPUT; fi
          if [[ "$PLATFORMS" == *"android"* ]]; then echo "build_android=true" >> $GITHUB_OUTPUT; else echo "build_android=false" >> $GITHUB_OUTPUT; fi
          if [[ "$PLATFORMS" == *"ios"* ]]; then echo "build_ios=true" >> $GITHUB_OUTPUT; else echo "build_ios=false" >> $GITHUB_OUTPUT; fi
          if [[ "$PLATFORMS" == *"macos"* ]]; then echo "build_macos=true" >> $GITHUB_OUTPUT; else echo "build_macos=false" >> $GITHUB_OUTPUT; fi
          if [[ "$PLATFORMS" == *"steam"* ]]; then echo "build_steam=true" >> $GITHUB_OUTPUT; else echo "build_steam=false" >> $GITHUB_OUTPUT; fi

  # Web Build
  web:
    needs: setup
    if: needs.setup.outputs.build_web == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/_build-web.yml
    with:
      godot_version: ${{ inputs.godot_version || '4.6.0' }}
      version_tag: ${{ needs.setup.outputs.version }}
    secrets: inherit

  # Android Build
  android:
    needs: setup
    if: needs.setup.outputs.build_android == 'true'
    uses: ./.github/workflows/_build-google-play.yml
    with:
      godot_version: ${{ inputs.godot_version || '4.6.0' }}
      version_tag: ${{ needs.setup.outputs.version }}
    secrets: inherit

  # iOS Build
  ios:
    needs: setup
    if: needs.setup.outputs.build_ios == 'true'
    uses: ./.github/workflows/_build-ios-appstore.yml
    with:
      godot_version: ${{ inputs.godot_version || '4.6.0' }}
      version_tag: ${{ needs.setup.outputs.version }}
    secrets: inherit

  # macOS Build
  macos:
    needs: setup
    if: needs.setup.outputs.build_macos == 'true'
    uses: ./.github/workflows/_build-macos-appstore.yml
    with:
      godot_version: ${{ inputs.godot_version || '4.6.0' }}
      version_tag: ${{ needs.setup.outputs.version }}
    secrets: inherit

  # Steam Build
  steam:
    needs: setup
    if: needs.setup.outputs.build_steam == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/_build-steam.yml
    with:
      godot_version: ${{ inputs.godot_version || '4.6.0' }}
      version_tag: ${{ needs.setup.outputs.version }}
    secrets: inherit

  publish:
    needs: [setup, web, android, ios, macos, steam]
    permissions:
      contents: write
      pages: write
      id-token: write
    
    # --- PUBLISH LEVER (Choose ONE) ---
    # option A: SAFE MODE (Disabled by default, only runs if you check the box in manual trigger)
    # if: always() && (needs.setup.result == 'success') && (inputs.dispatch_publish == true)
    
    # option B: PRODUCTION MODE (Runs on tags, release branch, OR when manually triggered)
    # Only publish if all build jobs succeeded (on relevant branches/tags, OR when manually triggered)
    if: always() && needs.setup.result == 'success' && (github.ref_type == 'tag' || github.ref_name == 'release' || inputs.dispatch_publish == true) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    
    # option C: FORCE DEBUG (Always runs if builds succeed - use for testing _publish.yml logic)
    # if: always() && (needs.setup.result == 'success')
    # ---------------------------------
    uses: ./.github/workflows/_publish.yml
    with:
      version: ${{ needs.setup.outputs.version }}
      changelog: ${{ needs.setup.outputs.changelog }}
      # TOGGLE THESE TO DISABLE SPECIFIC CHANNELS
      publish_web: ${{ needs.setup.outputs.build_web == 'true' }}
      publish_google_play: ${{ needs.setup.outputs.build_android == 'true' }}
      publish_apple: ${{ (needs.setup.outputs.build_ios == 'true' || needs.setup.outputs.build_macos == 'true') }}
      publish_github_release: ${{ needs.setup.outputs.is_full_build == 'true' }}
    secrets: inherit

  # Final Report
  report:
    needs: [publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: echo "Builds and Publish completed."
