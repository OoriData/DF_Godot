name: Build Web

on:
  workflow_call:
    inputs:
      godot_version:
        required: true
        type: string
        default: '4.6.0'
      version_tag:
        required: true
        type: string
    outputs:
      build_status:
        description: 'Build success/failure'
        value: ${{ jobs.build.outputs.status }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.export.outcome }}
    
    permissions:
      contents: write # Required for downloading artifacts internally

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Build Directory
        run: mkdir -p build/web

      - name: Silence Android Plugin Warnings
        run: |
          mkdir -p addons/GodotGoogleSignIn
          touch addons/GodotGoogleSignIn/.gdignore

      - name: List Files (Pre-Export)
        run: ls -F

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godot_version }}
          use-dotnet: false
          include-templates: true

      - name: Import Assets
        run: godot --headless --import

      - name: Export Godot Project
        run: |
          mkdir -p build/web
          godot --headless --log-file /tmp/godot_web.log --export-release "Web" build/web/index.html
          cd build/web
          zip -r ../Desolate_Frontiers_Webapp.zip .
          cd ../..

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/Desolate_Frontiers_Webapp.zip
